# ===================================================================
# TUDELFT_V3_KITE specific pipeline overrides
# -------------------------------------------------------------------
# This file is loaded on top of data/default_kite/config.yaml when
# kite_name resolves to TUDELFT_V3_KITE.
# Keep only what you want to override, or keep full explicit settings.
# ===================================================================

# ---------------------------------------------------------------
# Kite selection
# ---------------------------------------------------------------
kite_name: TUDELFT_V3_KITE

# ---------------------------------------------------------------
# Plot switches
# ---------------------------------------------------------------
is_with_struc_geometry_plot: false
is_with_struc_geometry_all_in_surfplan_yaml: false
is_with_airfoil_3d_plot: True
is_with_cg_and_inertia_plot: True
is_with_spanwise_chamber_plot: false

# ---------------------------------------------------------------
# Aerodynamic model input
# ---------------------------------------------------------------
airfoil_type: masure_regression

# ---------------------------------------------------------------
# CG / inertia mass model input
# ---------------------------------------------------------------
# Target wing mass [kg], excluding optional bridle mass.
## 11kg was the canopy mass reported in the 2019 campaign: https://github.com/awegroup/Flightdata08102019
total_wing_mass: 11.0

# Canopy areal density [kg/m^2].
# 0.1 kg/m^2 = 100 g/m^2.
canopy_kg_p_sqm: 0.1

# Tube areal density [kg/m^2] for LE + strut cylindrical surfaces.
# Set null to use budget-forced tube mass instead.
tube_kg_p_sqm: 0.7

# Tube mass split ratio used only when tube_kg_p_sqm is null.
le_to_strut_mass_ratio: null

# Lumped sensor mass [kg].
sensor_mass: 0.0

# Lumped valve mass [kg], at LE mid-span.
mid_span_valve_weight: 0.1

# Extra lumped mass [kg] per non-tip LE strut node.
strut_tube_weight: 0.1

# Add bridle masses to final CG/inertia node list.
include_bridle_mass: false

# Inertia reference point [x, y, z] [m]
# One can provided either a generic point: [0,0,0] or 'CG'
desired_point: 'CG'
